name: Tests

# Workflow SEPARADO del cron de datos (update.yml). Solo corre la suite pytest;
# no descarga datos, no commitea, no pushea. Permisos read-only.

on:
  push:
    branches: ['**']
    # Ignorar pushes que solo tocan datos generados por el cron (ruido + el
    # commit del bot lleva [skip ci], pero esto evita corridas innecesarias).
    paths-ignore:
      - 'timeseries/**'
      - 'csv/**'
      - 'latest/**'
      - 'raw/**'
      - '*.json'
      - '*.html'
      - 'mounts.db'
      - 'anomalies.csv'
      - 'catalog.csv'
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest
