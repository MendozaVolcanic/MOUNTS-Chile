[pytest]
# rootdir = raiz del repo. Los modulos de produccion viven ahi (scraper.py,
# anomalies.py, db.py); pythonpath="." los hace importables sin instalar paquete.
# conftest.py tambien inserta la raiz en sys.path como red de seguridad.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v
