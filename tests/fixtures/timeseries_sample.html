<!DOCTYPE html>
<!--

  /timeseries/<smithsonian_id>. Reproduce los dos patrones que parsea scraper.py:

    1) extract_image_paths(): rutas de imagen embebidas como strings dentro
       del JSON de Plotly (campo "text" de cada traza).
    2) extract_timeseries_json(): el bloque Plotly de series temporales.

  IMPORTANTE: este comentario evita a proposito incluir rutas .png literales
  o el patron del bloque graph. Los regex de scraper.py escanean TODO el
  documento (comentarios incluidos), asi que cualquier literal de ejemplo aqui
  se contaria como dato real y romperia los conteos. Los nombres y la estructura
  se derivaron de catalog.csv (datos reales del scraper).
-->
